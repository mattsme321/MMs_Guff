<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>✦ Daily Journal</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Georgia, serif; background: #fdfaf4; color: #2c2416; min-height: 100vh; }
    button { font-family: Georgia, serif; cursor: pointer; }
    input, textarea { font-family: Georgia, serif; }
    textarea { resize: vertical; }
    #app { min-height: 100vh; }
    .center-screen { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; padding: 32px; text-align: center; }
    .progress-bar-wrap { width: 200px; height: 3px; background: #e0d8c8; border-radius: 99px; overflow: hidden; }
    .progress-bar-inner { height: 100%; width: 40%; background: #c9a84c; border-radius: 99px; animation: slide 1.5s ease-in-out infinite; }
    @keyframes slide { 0%{transform:translateX(-100%)} 100%{transform:translateX(600%)} }
    header { background: #2c2416; color: #c9a84c; padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; border-bottom: 2px solid #c9a84c; }
    header .brand { font-size: 16px; font-weight: bold; letter-spacing: 1px; }
    header .sync { font-size: 10px; margin-top: 2px; letter-spacing: 1px; }
    header nav { display: flex; gap: 6px; }
    header nav button { border: 1px solid #c9a84c; border-radius: 4px; padding: 4px 11px; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; background: transparent; color: #c9a84c; }
    header nav button.active { background: #c9a84c; color: #2c2416; }
    #toast { position: fixed; top: 20px; right: 20px; background: #2c2416; color: #c9a84c; padding: 10px 20px; border-radius: 6px; font-size: 13px; z-index: 999; border: 1px solid #c9a84c; display: none; }
    main { max-width: 760px; margin: 0 auto; padding: 24px 16px; }
    .card { background: #fff; border-radius: 8px; border: 1px solid #e0d8c8; margin-bottom: 12px; overflow: hidden; }
    .card-body { padding: 14px 18px; }
    .card-header-dark { background: #2c2416; color: #c9a84c; padding: 9px 14px; display: flex; align-items: center; justify-content: space-between; }
    .banner { background: #2c2416; color: #c9a84c; border-radius: 8px; padding: 10px 18px; margin-bottom: 18px; font-size: 12px; letter-spacing: 1.5px; text-align: center; font-style: italic; border-left: 4px solid #c9a84c; }
    .progress-section { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .progress-label { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: #8a7560; }
    .progress-pct { font-size: 20px; font-weight: bold; }
    .progress-track { height: 6px; background: #e0d8c8; border-radius: 99px; }
    .progress-fill { height: 6px; border-radius: 99px; transition: width 0.4s ease; }
    .progress-date { font-size: 11px; color: #8a7560; margin-top: 6px; }
    .section-label { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: #8a7560; margin-bottom: 10px; }
    .mood-btns { display: flex; gap: 8px; flex-wrap: wrap; }
    .mood-btn { border: 1px solid #c9a84c; border-radius: 20px; padding: 5px 12px; font-size: 12px; background: #f5f0e8; color: #2c2416; }
    .mood-btn.selected { background: #2c2416; color: #c9a84c; }
    .group-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 18px; cursor: pointer; }
    .group-title { font-size: 14px; font-weight: bold; }
    .group-badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; background: #f0ebe0; color: #8a7560; margin-left: 10px; }
    .group-badge.complete { background: #d4edd4; color: #5a8a5a; }
    .group-mini-bar { width: 50px; height: 4px; background: #e0d8c8; border-radius: 99px; }
    .group-mini-fill { height: 4px; border-radius: 99px; transition: width 0.3s; }
    .group-tasks { padding: 12px 18px; }
    .task-row { margin-bottom: 10px; }
    .task-main { display: flex; align-items: flex-start; gap: 10px; }
    .task-check { accent-color: #c9a84c; width: 15px; height: 15px; margin-top: 3px; cursor: pointer; flex-shrink: 0; }
    .task-body { flex: 1; }
    .task-label { font-size: 14px; line-height: 1.45; }
    .task-label.done { color: #aaa; text-decoration: line-through; }
    .task-note { margin-top: 3px; width: 100%; border: none; border-bottom: 1px dashed #e0d8c8; background: transparent; font-size: 12px; color: #8a7560; outline: none; padding: 1px 0; }
    .sub-item-btn { background: none; border: 1px dashed #c9a84c; color: #c9a84c; border-radius: 4px; font-size: 11px; padding: 1px 7px; margin-left: 8px; line-height: 1.5; cursor: pointer; }
    .sub-item { display: flex; align-items: center; gap: 8px; margin-top: 6px; padding-left: 30px; }
    .sub-divider { width: 1px; height: 16px; background: #c9a84c; margin-right: 2px; opacity: 0.4; flex-shrink: 0; }
    .sub-check { accent-color: #c9a84c; width: 13px; height: 13px; cursor: pointer; flex-shrink: 0; }
    .sub-input { flex: 1; border: none; border-bottom: 1px dashed #e0d8c8; background: transparent; font-size: 13px; outline: none; padding: 1px 0; }
    .sub-remove { background: none; border: none; color: #c9a84c; font-size: 16px; line-height: 1; cursor: pointer; }
    .adhoc-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 18px; border-bottom: 1px solid #e0d8c8; }
    .adhoc-title { font-size: 14px; font-weight: bold; }
    .adhoc-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .adhoc-input { flex: 1; border: none; border-bottom: 1px dashed #c9a84c; background: transparent; font-size: 14px; outline: none; padding: 2px 0; }
    .adhoc-remove { background: none; border: none; color: #c9a84c; font-size: 18px; cursor: pointer; }
    .empty-msg { color: #8a7560; font-size: 13px; font-style: italic; }
    .journal-textarea { width: 100%; border: 1px dashed #c9a84c; border-radius: 6px; padding: 10px 12px; font-size: 13px; color: #2c2416; background: #fdfaf4; outline: none; line-height: 1.6; }
    .btn-gold { background: #c9a84c; color: #2c2416; border: none; border-radius: 4px; padding: 6px 12px; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; font-family: Georgia, serif; }
    .btn-dark { background: #2c2416; color: #c9a84c; border: 2px solid #c9a84c; border-radius: 6px; padding: 11px 30px; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; font-family: Georgia, serif; }
    .btn-outline { background: transparent; color: #2c2416; border: 1px solid #c9a84c; border-radius: 4px; padding: 4px 10px; font-size: 11px; cursor: pointer; font-family: Georgia, serif; }
    .btn-icon { background: none; border: none; color: #c9a84c; font-size: 17px; cursor: pointer; }
    .btn-retry { background: #2c2416; color: #c9a84c; border: 2px solid #c9a84c; border-radius: 6px; padding: 10px 24px; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; font-family: Georgia, serif; }
    .history-entry { background: #fff; border: 1px solid #e0d8c8; border-radius: 8px; padding: 12px 16px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }
    .history-date { font-weight: bold; margin-bottom: 2px; }
    .history-meta { font-size: 12px; color: #8a7560; }
    .history-actions { display: flex; gap: 8px; }
    .settings-input { border: 1px solid #e0d8c8; border-radius: 6px; padding: 6px 10px; font-size: 13px; color: #2c2416; background: #fdfaf4; outline: none; font-family: Georgia, serif; }
    .settings-row { display: flex; gap: 8px; margin-bottom: 7px; align-items: center; }
    .download-center { text-align: center; margin-bottom: 32px; }
    .page-title { font-size: 14px; letter-spacing: 2px; text-transform: uppercase; color: #8a7560; margin-bottom: 20px; font-weight: normal; }
    code { background: #f0ebe0; padding: 2px 6px; border-radius: 3px; font-size: 12px; }
  </style>
</head>
<body>
<div id="app"></div>
<div id="toast"></div>

<script>
const SUPABASE_URL = "https://mqwvooydryvzphaunjto.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1xd3Zvb3lkcnl2enBoYXVuanRvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwODQxNjAsImV4cCI6MjA5MjY2MDE2MH0._bCJsDQOLlY5iS0VJTLMjM_vj-Sg5O08cVslxYppOLI";

const EXPANDABLE_OTHER_GROUPS = ["education","tech","health","admin"];
const MOODS = ["🌟 Energised","😊 Good","😐 Neutral","😓 Tired","😤 Stressed"];

const DEFAULT_TASK_GROUPS = [
  { id:"am", label:"🌅 AM", tasks:["Meditation","Grace & Prayer","Hydrate: tea, water","Physio Plus; Martial Arts; Balance; Mobility; Shorties; Walk","Cold Shower","Read"] },
  { id:"business", label:"💼 Business & Finance", tasks:["Trade Futures","NS&BC+","Review My Portfolio","Autopilot: Review New Buys/Sells","Review Staking Positions","Review Buys/DCA","RE: BinaryX; RealT; GROK Outlook","Crypto Cards","CryptEd"] },
  { id:"education", label:"📚 Education", tasks:["Daily Writing (HFL)","Vocals: Read World Class Speech System; Generate random word; Talk 1-2m; GROK","Other"] },
  { id:"tech", label:"💻 Tech", tasks:["Claude Code Projects","Migrate Notion","Linux Setup","Other"] },
  { id:"admin", label:"🗂 Administration — Personal", tasks:["Retirement Planning","Check FB birthdays","2GB News","Document income/expenses","Backup: Journal, Project Folder","Other"] },
  { id:"health", label:"🏥 Health", tasks:["Meds","Juggling, roller, tennis ball, feet up/nap","Other"] },
  { id:"night", label:"🌙 Night (18:30–21:30)", tasks:["Eat by 19:00","Plan tomorrow's tasks","Deep Sleep log: % REM / % Total","Steps; km; HR","Dim lights & screens by 21:00","Read","Grace & Prayer","4-7-8 Breathing","Lights out by 21:30"] },
];

const todayStr = () => { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; };
const formatDate = iso => { const [y,m,d]=iso.split("-"); return new Date(y,m-1,d).toLocaleDateString("en-US",{weekday:"long",year:"numeric",month:"long",day:"numeric"}); };
const makeTaskObj = label => ({ label, done:false, note:"", subItems:[] });
const initGroups = groups => groups.map(g => ({...g, tasks:g.tasks.map(makeTaskObj)}));
const escHtml = s => String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");

// ── State ──────────────────────────────────────────────────────────────────
let state = {
  view: "journal",
  syncStatus: "loading",
  taskGroups: DEFAULT_TASK_GROUPS,
  entries: {},
  currentDate: todayStr(),
  historyDate: null,
  expandedGroups: {},
};
let saveTimer = null;
let renderScheduled = false;

// ── Supabase ───────────────────────────────────────────────────────────────
async function dbLoad() {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/journal?id=eq.main&select=data`, {
    headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` }
  });
  if (!r.ok) throw new Error(r.status);
  const rows = await r.json();
  return rows[0]?.data || null;
}

async function dbSave(payload) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/journal?id=eq.main`, {
    method: "PATCH",
    headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}`, "Content-Type":"application/json", Prefer:"return=minimal" },
    body: JSON.stringify({ data: payload, updated_at: new Date().toISOString() })
  });
  if (!r.ok) throw new Error(r.status);
}

function scheduleSave() {
  setSyncStatus("saving");
  if (saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    try {
      await dbSave({ taskGroups: state.taskGroups, entries: state.entries });
      setSyncStatus("synced");
    } catch { setSyncStatus("error"); }
  }, 800);
}

function setSyncStatus(s) {
  state.syncStatus = s;
  const el = document.querySelector("header .sync");
  if (!el) return;
  const label = { saving:"☁️ Saving…", synced:"✓ Synced", error:"⚠️ Sync error", loading:"⏳ Connecting…" }[s] || "";
  const color = { synced:"#5a8a5a", saving:"#a08840", error:"#c0392b", loading:"#a08840" }[s];
  el.textContent = label;
  el.style.color = color;
}

// ── Schedule a render without clobbering focused inputs ────────────────────
function scheduleRender() {
  if (renderScheduled) return;
  renderScheduled = true;
  requestAnimationFrame(() => { renderScheduled = false; render(); });
}

// ── Entry helpers ──────────────────────────────────────────────────────────
function getEntry(date) {
  return state.entries[date] || { groups: initGroups(state.taskGroups), adhocTasks:[], notes:"", reflection:"", mood:"" };
}

function mutateEntry(date, fn) {
  const entry = JSON.parse(JSON.stringify(getEntry(date)));
  fn(entry);
  state.entries = { ...state.entries, [date]: entry };
  scheduleSave();
  scheduleRender();
}

function toggleTask(gIdx, tIdx) {
  mutateEntry(state.currentDate, e => { e.groups[gIdx].tasks[tIdx].done = !e.groups[gIdx].tasks[tIdx].done; });
}
function addSubItem(gIdx, tIdx) {
  mutateEntry(state.currentDate, e => { e.groups[gIdx].tasks[tIdx].subItems.push({label:"",done:false}); });
}
function toggleSubItem(gIdx, tIdx, sIdx) {
  mutateEntry(state.currentDate, e => { e.groups[gIdx].tasks[tIdx].subItems[sIdx].done = !e.groups[gIdx].tasks[tIdx].subItems[sIdx].done; });
}
function removeSubItem(gIdx, tIdx, sIdx) {
  mutateEntry(state.currentDate, e => { e.groups[gIdx].tasks[tIdx].subItems.splice(sIdx,1); });
}
function addAdhoc() {
  mutateEntry(state.currentDate, e => { e.adhocTasks.push({label:"",done:false}); });
}
function toggleAdhoc(i) {
  mutateEntry(state.currentDate, e => { e.adhocTasks[i].done = !e.adhocTasks[i].done; });
}
function removeAdhoc(i) {
  mutateEntry(state.currentDate, e => { e.adhocTasks.splice(i,1); });
}
function setMood(m) {
  mutateEntry(state.currentDate, e => { e.mood = m; });
}

// ── Live text input handlers (no re-render, just save) ─────────────────────
function onTaskNoteInput(gIdx, tIdx, val) {
  const entry = getEntry(state.currentDate);
  entry.groups[gIdx].tasks[tIdx].note = val;
  state.entries = { ...state.entries, [state.currentDate]: entry };
  scheduleSave();
}
function onSubLabelInput(gIdx, tIdx, sIdx, val) {
  const entry = getEntry(state.currentDate);
  entry.groups[gIdx].tasks[tIdx].subItems[sIdx].label = val;
  state.entries = { ...state.entries, [state.currentDate]: entry };
  scheduleSave();
}
function onAdhocLabelInput(i, val) {
  const entry = getEntry(state.currentDate);
  entry.adhocTasks[i].label = val;
  state.entries = { ...state.entries, [state.currentDate]: entry };
  scheduleSave();
}
function onNotesInput(val) {
  const entry = getEntry(state.currentDate);
  entry.notes = val;
  state.entries = { ...state.entries, [state.currentDate]: entry };
  scheduleSave();
}
function onReflectionInput(val) {
  const entry = getEntry(state.currentDate);
  entry.reflection = val;
  state.entries = { ...state.entries, [state.currentDate]: entry };
  scheduleSave();
}

// ── Group toggle ───────────────────────────────────────────────────────────
function toggleGroup(id) {
  state.expandedGroups[id] = state.expandedGroups[id] === false ? undefined : false;
  scheduleRender();
}

// ── Settings helpers ───────────────────────────────────────────────────────
function deleteGroup(gIdx) {
  if (!confirm(`Delete "${state.taskGroups[gIdx].label}"?`)) return;
  state.taskGroups = state.taskGroups.filter((_,i)=>i!==gIdx);
  scheduleSave(); scheduleRender();
}
function removeSettingsTask(gIdx, tIdx) {
  state.taskGroups[gIdx].tasks = state.taskGroups[gIdx].tasks.filter((_,i)=>i!==tIdx);
  scheduleSave(); scheduleRender();
}
function addSettingsTask(gIdx) {
  const inp = document.getElementById(`new-task-${state.taskGroups[gIdx].id}`);
  if (!inp || !inp.value.trim()) return;
  state.taskGroups[gIdx].tasks.push(inp.value.trim());
  scheduleSave(); scheduleRender();
}
function onSettingsTaskInput(gIdx, tIdx, val) {
  state.taskGroups[gIdx].tasks[tIdx] = val;
  scheduleSave();
}
function addGroup() {
  const inp = document.getElementById("new-group-label");
  if (!inp || !inp.value.trim()) return;
  state.taskGroups.push({id:"group-"+Date.now(), label:inp.value.trim(), tasks:[]});
  scheduleSave(); scheduleRender();
}

// ── Navigation ─────────────────────────────────────────────────────────────
function setView(v) { state.view=v; state.historyDate=null; scheduleRender(); }
function setHistoryDate(d) { state.historyDate=d; scheduleRender(); }

// ── Progress ───────────────────────────────────────────────────────────────
function calcProgress() {
  const e = getEntry(state.currentDate);
  const allStd = (e.groups||[]).flatMap(g=>g.tasks||[]);
  const allSub = allStd.flatMap(t=>t.subItems||[]);
  const total = allStd.length + allSub.length + (e.adhocTasks?.length||0);
  const done = allStd.filter(t=>t.done).length + allSub.filter(s=>s.done).length + (e.adhocTasks?.filter(t=>t.done).length||0);
  return total===0?0:Math.round((done/total)*100);
}

// ── Markdown export ────────────────────────────────────────────────────────
function generateMarkdown(date, e) {
  const lines=[`# Daily Journal — ${formatDate(date)}`,"",`**Mood:** ${e.mood||"_Not recorded_"}`,""];
  (e.groups||[]).forEach(g=>{
    const allT=g.tasks||[]; const allSub=allT.flatMap(t=>t.subItems||[]);
    const done=allT.filter(t=>t.done).length+allSub.filter(s=>s.done).length;
    lines.push(`## ${g.label} (${done}/${allT.length+allSub.length})`);
    allT.forEach(t=>{ lines.push(`- [${t.done?"x":" "}] ${t.label}${t.note?` — _${t.note}_`:""}`); (t.subItems||[]).forEach(s=>lines.push(`  - [${s.done?"x":" "}] ${s.label||"(unnamed)"}`)); });
    lines.push("");
  });
  const adhoc=e.adhocTasks||[];
  if(adhoc.length){lines.push(`## 📌 Ad-hoc Tasks (${adhoc.filter(t=>t.done).length}/${adhoc.length})`); adhoc.forEach(t=>lines.push(`- [${t.done?"x":" "}] ${t.label||"(unnamed)"}`)); lines.push("");}
  lines.push("## Notes"); lines.push(e.notes||"_None_"); lines.push("");
  lines.push("## End-of-Day Reflection"); lines.push(e.reflection||"_None_");
  return lines.join("\n");
}
function downloadMarkdown(date) {
  const e = getEntry(date);
  const blob=new Blob([generateMarkdown(date,e)],{type:"text/markdown"});
  const url=URL.createObjectURL(blob); const a=document.createElement("a"); a.href=url; a.download=`journal-${date}.md`; a.click(); URL.revokeObjectURL(url);
  showToast("Journal downloaded!");
}
function showToast(msg) {
  const el=document.getElementById("toast"); el.textContent=msg; el.style.display="block";
  setTimeout(()=>el.style.display="none",2500);
}

// ── Retry ──────────────────────────────────────────────────────────────────
function retryLoad() { state.syncStatus="loading"; render(); init(); }

// ── Render ─────────────────────────────────────────────────────────────────
function render() {
  const { view, syncStatus, taskGroups, entries, currentDate, historyDate, expandedGroups } = state;

  if (syncStatus==="loading") {
    document.getElementById("app").innerHTML=`<div class="center-screen"><div style="font-size:28px">✦</div><div style="font-size:14px;color:#8a7560;letter-spacing:2px;text-transform:uppercase">Connecting to Supabase…</div><div class="progress-bar-wrap"><div class="progress-bar-inner"></div></div></div>`;
    return;
  }
  if (syncStatus==="error") {
    document.getElementById("app").innerHTML=`<div class="center-screen"><div style="font-size:28px">⚠️</div><div style="font-size:15px;font-weight:bold">Cannot connect to Supabase</div><div style="font-size:13px;color:#8a7560;max-width:340px;line-height:1.6">Check that your Supabase project is active and the <code>journal</code> table has a row with <code>id = 'main'</code>.</div><button class="btn-retry" onclick="retryLoad()">Retry</button></div>`;
    return;
  }

  const syncLabel = { saving:"☁️ Saving…", synced:"✓ Synced" }[syncStatus]||"✓ Synced";
  const syncColor = syncStatus==="synced"?"#5a8a5a":"#a08840";
  const entry = getEntry(currentDate);
  const pct = calcProgress();
  const historyDates = Object.keys(entries).filter(d=>d!==currentDate).sort((a,b)=>b.localeCompare(a));

  // ── Build content ──
  let content = "";

  if (view==="journal") {
    // Groups
    let groupsHtml = "";
    (entry.groups||initGroups(taskGroups)).forEach((group,gIdx) => {
      const allT=group.tasks||[]; const allSub=allT.flatMap(t=>t.subItems||[]);
      const done=allT.filter(t=>t.done).length+allSub.filter(s=>s.done).length;
      const total=allT.length+allSub.length;
      const isOpen=expandedGroups[group.id]!==false;
      const complete=done===total&&total>0;
      const fillPct=total===0?0:Math.round((done/total)*100);
      let tasksHtml="";
      if (isOpen) {
        allT.forEach((task,tIdx) => {
          const expandable=isExpandableOther(group.id,task.label);
          let subHtml="";
          if (expandable) {
            (task.subItems||[]).forEach((s,sIdx) => {
              subHtml+=`<div class="sub-item">
                <div class="sub-divider"></div>
                <input type="checkbox" class="sub-check" ${s.done?"checked":""} onchange="toggleSubItem(${gIdx},${tIdx},${sIdx})">
                <input class="sub-input" value="${escHtml(s.label)}" placeholder="Sub-item…" style="color:${s.done?'#aaa':'#2c2416'};text-decoration:${s.done?'line-through':'none'}" oninput="onSubLabelInput(${gIdx},${tIdx},${sIdx},this.value)">
                <button class="sub-remove" onclick="removeSubItem(${gIdx},${tIdx},${sIdx})">×</button>
              </div>`;
            });
          }
          tasksHtml+=`<div class="task-row">
            <div class="task-main">
              <input type="checkbox" class="task-check" ${task.done?"checked":""} onchange="toggleTask(${gIdx},${tIdx})">
              <div class="task-body">
                <div style="display:flex;align-items:center;gap:8px">
                  <span class="task-label${task.done?' done':''}">${escHtml(task.label)}</span>
                  ${expandable?`<button class="sub-item-btn" onclick="addSubItem(${gIdx},${tIdx})">+ sub-item</button>`:""}
                </div>
                <input class="task-note" value="${escHtml(task.note||'')}" placeholder="Note…" oninput="onTaskNoteInput(${gIdx},${tIdx},this.value)">
              </div>
            </div>${subHtml}
          </div>`;
        });
      }
      groupsHtml+=`<div class="card" style="border-color:${complete?'#b8d8b8':'#e0d8c8'};margin-bottom:12px">
        <div class="group-header" style="background:${complete?'#f0f7f0':'transparent'};border-bottom:${isOpen?`1px solid ${complete?'#b8d8b8':'#e0d8c8'}`:'none'}" onclick="toggleGroup('${group.id}')">
          <div style="display:flex;align-items:center">
            <span class="group-title">${escHtml(group.label)}</span>
            <span class="group-badge${complete?' complete':''}">${done}/${total}</span>
          </div>
          <div style="display:flex;align-items:center;gap:10px">
            <div class="group-mini-bar"><div class="group-mini-fill" style="width:${fillPct}%;background:${complete?'#5a8a5a':'#c9a84c'}"></div></div>
            <span style="color:#c9a84c;font-size:11px">${isOpen?"▲":"▼"}</span>
          </div>
        </div>
        ${isOpen?`<div class="group-tasks">${tasksHtml}</div>`:""}
      </div>`;
    });

    // Adhoc
    let adhocRows="";
    (entry.adhocTasks||[]).forEach((t,i) => {
      adhocRows+=`<div class="adhoc-row">
        <input type="checkbox" class="task-check" ${t.done?"checked":""} onchange="toggleAdhoc(${i})">
        <input class="adhoc-input" value="${escHtml(t.label)}" placeholder="Task description…" style="color:${t.done?'#aaa':'#2c2416'};text-decoration:${t.done?'line-through':'none'}" oninput="onAdhocLabelInput(${i},this.value)">
        <button class="adhoc-remove" onclick="removeAdhoc(${i})">×</button>
      </div>`;
    });

    content=`
      <div class="banner">✦ The Pen and Sword in Accord ✦</div>
      <div class="card card-body" style="margin-bottom:18px">
        <div class="progress-section">
          <span class="progress-label">Today's Progress</span>
          <span class="progress-pct" style="color:${pct===100?'#5a8a5a':'#2c2416'}">${pct}%</span>
        </div>
        <div class="progress-track"><div class="progress-fill" style="width:${pct}%;background:${pct===100?'#5a8a5a':'#c9a84c'}"></div></div>
        <div class="progress-date">${formatDate(currentDate)}</div>
      </div>
      <div class="card card-body" style="margin-bottom:18px">
        <div class="section-label">How are you feeling?</div>
        <div class="mood-btns">${MOODS.map(m=>`<button class="mood-btn${entry.mood===m?' selected':''}" onclick="setMood('${m}')">${m}</button>`).join("")}</div>
      </div>
      ${groupsHtml}
      <div class="card" style="margin-bottom:12px">
        <div class="adhoc-header"><span class="adhoc-title">📌 Ad-hoc Tasks</span><button class="btn-gold" onclick="addAdhoc()">+ Add</button></div>
        <div class="card-body" id="adhoc-list">${(entry.adhocTasks||[]).length===0?'<div class="empty-msg">No ad-hoc tasks yet.</div>':adhocRows}</div>
      </div>
      <div class="card card-body" style="margin-bottom:12px">
        <div class="section-label">Notes</div>
        <textarea class="journal-textarea" rows="4" placeholder="Capture thoughts, updates, ideas, links…" oninput="onNotesInput(this.value)">${escHtml(entry.notes||"")}</textarea>
      </div>
      <div class="card card-body" style="margin-bottom:24px">
        <div class="section-label">End-of-Day Reflection</div>
        <textarea class="journal-textarea" rows="4" placeholder="What went well? What would you do differently? What are you grateful for?" oninput="onReflectionInput(this.value)">${escHtml(entry.reflection||"")}</textarea>
      </div>
      <div class="download-center">
        <button class="btn-dark" onclick="downloadMarkdown('${currentDate}')">↓ Download Today's Journal (.md)</button>
      </div>`;
  }

  if (view==="history" && !historyDate) {
    let rows = historyDates.length===0 ? '<div class="empty-msg">No past entries yet.</div>' : "";
    historyDates.forEach(d => {
      const e=entries[d]; const allT=(e.groups||[]).flatMap(g=>g.tasks||[]); const allSub=allT.flatMap(t=>t.subItems||[]);
      const done=allT.filter(t=>t.done).length+allSub.filter(s=>s.done).length+(e.adhocTasks?.filter(t=>t.done).length||0);
      const total=allT.length+allSub.length+(e.adhocTasks?.length||0);
      rows+=`<div class="history-entry"><div><div class="history-date">${formatDate(d)}</div><div class="history-meta">${done}/${total} tasks · ${e.mood||"No mood recorded"}</div></div><div class="history-actions"><button class="btn-outline" onclick="setHistoryDate('${d}')">View</button><button class="btn-outline" onclick="downloadMarkdown('${d}')">↓ .md</button></div></div>`;
    });
    content=`<h2 class="page-title">Past Entries</h2>${rows}`;
  }

  if (view==="history" && historyDate) {
    const e=getEntry(historyDate);
    let groupsHtml="";
    (e.groups||[]).forEach((g,gi)=>{
      let tasksHtml="";
      (g.tasks||[]).forEach((t,ti)=>{
        let subHtml=""; (t.subItems||[]).forEach(s=>{ subHtml+=`<div style="display:flex;gap:8px;align-items:center;padding-left:28px;margin-top:4px"><input type="checkbox" ${s.done?"checked":""} disabled style="accent-color:#c9a84c;width:12px;height:12px"><span style="font-size:12px;color:${s.done?'#aaa':'#2c2416'};text-decoration:${s.done?'line-through':'none'}">${escHtml(s.label||"(unnamed)")}</span></div>`; });
        tasksHtml+=`<div style="margin-bottom:6px"><div style="display:flex;gap:8px;align-items:flex-start"><input type="checkbox" ${t.done?"checked":""} disabled style="accent-color:#c9a84c;margin-top:2px"><div><div style="font-size:13px;color:${t.done?'#aaa':'#2c2416'};text-decoration:${t.done?'line-through':'none'}">${escHtml(t.label)}</div>${t.note?`<div style="font-size:11px;color:#8a7560;font-style:italic">${escHtml(t.note)}</div>`:""}</div></div>${subHtml}</div>`;
      });
      groupsHtml+=`<div class="card" style="margin-bottom:10px;padding:12px 16px"><div style="font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#8a7560;margin-bottom:8px">${escHtml(g.label)}</div>${tasksHtml}</div>`;
    });
    let adhocHtml="";
    if((e.adhocTasks||[]).length>0){ let rows=""; e.adhocTasks.forEach(t=>{rows+=`<div style="display:flex;gap:8px;align-items:center;margin-bottom:5px"><input type="checkbox" ${t.done?"checked":""} disabled style="accent-color:#c9a84c"><span style="font-size:13px;color:${t.done?'#aaa':'#2c2416'};text-decoration:${t.done?'line-through':'none'}">${escHtml(t.label||"(unnamed)")}</span></div>`;}); adhocHtml=`<div class="card" style="margin-bottom:10px;padding:12px 16px"><div style="font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#8a7560;margin-bottom:8px">Ad-hoc Tasks</div>${rows}</div>`; }
    const notesHtml=e.notes?`<div class="card" style="margin-bottom:10px;padding:12px 16px"><div style="font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#8a7560;margin-bottom:6px">Notes</div><div style="white-space:pre-wrap;font-size:13px">${escHtml(e.notes)}</div></div>`:"";
    const reflHtml=e.reflection?`<div class="card" style="margin-bottom:10px;padding:12px 16px"><div style="font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#8a7560;margin-bottom:6px">Reflection</div><div style="white-space:pre-wrap;font-size:13px">${escHtml(e.reflection)}</div></div>`:"";
    content=`<button class="btn-outline" style="margin-bottom:18px" onclick="setHistoryDate(null)">← Back</button><h2 style="font-size:17px;margin-bottom:6px">${formatDate(historyDate)}</h2>${e.mood?`<div style="margin-bottom:14px;color:#8a7560;font-size:13px">Mood: ${e.mood}</div>`:""}${groupsHtml}${adhocHtml}${notesHtml}${reflHtml}<div style="text-align:center;margin-top:18px"><button class="btn-dark" onclick="downloadMarkdown('${historyDate}')">↓ Download (.md)</button></div>`;
  }

  if (view==="settings") {
    let groupsHtml="";
    taskGroups.forEach((group,gIdx)=>{
      let tasksHtml="";
      group.tasks.forEach((task,tIdx)=>{
        tasksHtml+=`<div class="settings-row"><input class="settings-input" style="flex:1;font-size:12px" value="${escHtml(task)}" oninput="onSettingsTaskInput(${gIdx},${tIdx},this.value)"><button class="btn-icon" onclick="removeSettingsTask(${gIdx},${tIdx})">×</button></div>`;
      });
      groupsHtml+=`<div class="card" style="margin-bottom:14px">
        <div class="card-header-dark">
          <span style="font-size:13px;font-weight:bold">${escHtml(group.label)}</span>
          <button style="background:none;border:none;color:#c9a84c;cursor:pointer;font-size:14px;opacity:0.7" onclick="deleteGroup(${gIdx})">🗑</button>
        </div>
        <div style="padding:10px 14px">
          ${tasksHtml}
          <div style="display:flex;gap:8px;margin-top:4px">
            <input class="settings-input" style="flex:1;font-size:12px" placeholder="Add task…" id="new-task-${group.id}" onkeydown="if(event.key==='Enter')addSettingsTask(${gIdx})">
            <button class="btn-gold" onclick="addSettingsTask(${gIdx})">Add</button>
          </div>
        </div>
      </div>`;
    });
    content=`<h2 class="page-title">Standard Task Groups</h2><p style="font-size:12px;color:#8a7560;margin-bottom:20px">Manage your recurring tasks by group. Changes apply to new days.</p>${groupsHtml}<div class="card" style="border:1px dashed #c9a84c;padding:12px 14px;margin-top:6px"><div style="font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#8a7560;margin-bottom:8px">Add New Group</div><div style="display:flex;gap:8px"><input class="settings-input" style="flex:1" placeholder="e.g. 🏋️ Exercise" id="new-group-label"><button class="btn-gold" onclick="addGroup()">Create</button></div></div>`;
  }

  document.getElementById("app").innerHTML=`
    <header>
      <div>
        <div class="brand">✦ Daily Journal</div>
        <div class="sync" style="color:${syncColor}">${syncLabel}</div>
      </div>
      <nav>
        <button class="${view==='journal'?'active':''}" onclick="setView('journal')">Journal</button>
        <button class="${view==='history'?'active':''}" onclick="setView('history')">History</button>
        <button class="${view==='settings'?'active':''}" onclick="setView('settings')">Settings</button>
      </nav>
    </header>
    <main>${content}</main>`;
}

function isExpandableOther(groupId, taskLabel) {
  return (EXPANDABLE_OTHER_GROUPS.includes(groupId) && taskLabel==="Other") ||
    (groupId==="business" && ["NS&BC+","Crypto Cards","CryptEd"].includes(taskLabel));
}

// ── Init ───────────────────────────────────────────────────────────────────
async function init() {
  render();
  try {
    const data = await dbLoad();
    if (data?.taskGroups) state.taskGroups = data.taskGroups;
    if (data?.entries) state.entries = data.entries;
    state.syncStatus = "synced";
    render();
  } catch {
    state.syncStatus = "error";
    render();
  }
}

init();
</script>
</body>
</html>
